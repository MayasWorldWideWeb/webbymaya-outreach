name: WebByMaya Outreach

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      zone:
        description: 'Specific zone (blank = next in rotation)'
        required: false
        default: ''
      sms_limit:
        description: 'Max SMS to send'
        required: false
        default: '200'
      email_limit:
        description: 'Max emails to send'
        required: false
        default: '50'
      dry_run:
        description: 'Dry run - find and enrich only, no sends'
        required: false
        default: 'false'

jobs:
  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 ddgs googlemaps twilio sendgrid

      - name: Load zone state
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 ci_load_state.py

      - name: Set zone override
        if: ${{ github.event.inputs.zone != '' }}
        env:
          INPUT_ZONE: ${{ github.event.inputs.zone }}
        run: python3 ci_set_zone.py

      - name: Find prospects
        env:
          YELP_API_KEY:  ${{ secrets.YELP_API_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python3 scheduled_find.py

      - name: Enrich emails
        run: |
          TODAY=$(date +%Y-%m-%d)
          CSV="prospects_${TODAY}.csv"
          if [ -f "$CSV" ]; then
            python3 enrich_emails.py --input "$CSV"
          else
            echo "No prospects CSV for today, skipping"
          fi

      - name: Check bounces
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 check_bounces.py

      - name: Send outreach
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          TWILIO_ACCOUNT_SID:  ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 scheduled_send.py --sms-limit ${{ github.event.inputs.sms_limit || '200' }} --email-limit ${{ github.event.inputs.email_limit || '50' }}

      - name: Save zone state
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python3 ci_save_state.py
